# AI Coding Companion 配置模板
# 复制此文件为 config.yaml 并修改为你的配置
#
# 监控模式说明：
# 1. 日志监控（传统模式）：监控 Aider 日志文件
# 2. 终端监控（推荐模式）：直接启动并监控 AI 工具进程，实时性更好

version: "1.0"

# 监控的项目列表
projects:
  # 示例项目 1 - Aider 监控
  - name: "my-web-app"
    path: "~/projects/my-web-app"    # 项目路径（用于显示）
    tool: "aider"                    # 工具类型，当前只支持 "aider"
    enabled: true                    # 是否启用监控
    
    # Aider 专用配置
    aider_config:
      # 日志文件路径（留空或使用默认值将自动检测）
      log_path: ""                   # 留空自动检测，或指定具体路径如 "~/.aider/chat.history.md"
      auto_detect: true              # 是否自动检测日志文件
      
      completion_markers:            # 完成标记列表
        - "Added"                    # 文件已添加
        - "Committed"                # 已提交代码
        - "^>"                       # 正则：返回提示符（以 > 开头的行）
        # 如果工作完成通知没有发送，尝试添加更多标记：
        # - "^\\$"                   # 正则：返回 bash 提示符（$ ）
        # - "✓"                      # 完成标记（✓）
        # - "Done"                   # 完成
        # - "Finished"               # 完成
        # - "Completed"              # 完成
        # - "All done"               # 全部完成
        # - "Ready for next"         # 准备下一个
  
