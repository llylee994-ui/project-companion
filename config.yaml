# AI Coding Companion 配置模板
# 复制此文件为 config.yaml 并修改为你的配置

version: "1.0"

# 监控的项目列表
projects:
  # 示例项目 1 - Aider 监控
  - name: "my-web-app"
    path: "~/projects/my-web-app"    # 项目路径（用于显示）
    tool: "aider"                    # 工具类型，当前只支持 "aider"
    enabled: true                    # 是否启用监控
    
    # Aider 专用配置
    aider_config:
      log_path: "~/.aider.chat.history.md"   # Aider 日志文件路径
      completion_markers:            # 完成标记列表
        - "Added"                    # 文件已添加
        - "Committed"                # 已提交代码
        - "^>"                       # 正则：返回提示符（以 > 开头的行）
        # 可选的其他标记：
        # - "✓"                      # 完成标记
        # - "Done"                   # 完成
        # - "^\\$"                   # 正则：返回 bash 提示符
  
  # 示例项目 2
  # - name: "backend-api"
  #   path: "~/projects/backend-api"
  #   tool: "aider"
  #   enabled: true
  #   aider_config:
  #     log_path: "~/.aider/history"
  #     completion_markers:
  #       - "Added"
  #       - "Committed"
  #       - "^>"

# 通知设置
notification:
  enabled: true                      # 是否启用通知
  channels:
    # 飞书通知（推荐）
    - type: "feishu"
      target: "chat:oc_362047fad55744020b6c11c92951938a"  # 当前群聊
      webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/cf13d01e-0d35-4abf-9b1e-d7af77afd6c5"
    
    # Discord 通知（可选）
    # - type: "discord"
    #   target: "channel:123456789"
    
    # 邮件通知（可选）
    # - type: "email"
    #   target: "your@email.com"
    
    # Telegram 通知（可选）
    # - type: "telegram"
    #   target: "@your_username"

# 监控设置
monitoring:
  check_interval: 2                  # 检查间隔（秒），建议 2-5 秒
  max_session_duration: 1800         # 最大会话时长（秒），30分钟，超时自动重置

