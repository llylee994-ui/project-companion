monitoring:
  check_interval: 2
  max_session_duration: 1800
notification:
  channels:
  - target: chat:oc_362047fad55744020b6c11c92951938a
    type: feishu
    webhook: https://open.feishu.cn/open-apis/bot/v2/hook/cf13d01e-0d35-4abf-9b1e-d7af77afd6c5
  enabled: true
permissions:
  auto_allow_patterns:
  - .*\.py$
  - .*\.txt$
  - .*\.md$
  - .*test.*\.py$
  - .*docs?/.*
  - .*config/.*
  mode: auto
projects:
- enabled: true
  name: Aider监控
  path: C:\Users\liliy\.openclaw\workspace\project-companion
  terminal_config:
    args:
    - --model
    - deepseek/deepseek-chat
    auto_response:
      allow_response: '

        '
      default_allow: true
      deny_response: "\x03"
      enabled: true
      whitelist:
      - .*\.py$
      - .*\.txt$
      - .*\.md$
      - .*\.json$
      - .*\.yaml$
      - .*\.yml$
    auto_start: true
    command:
    - aider
    completion_markers:
    - Added
    - Committed
    - ^>
    - ✓
    - Done
    - Finished
    - Completed
    enabled: true
  tool: aider
version: '2.0'
