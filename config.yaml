# 通知设置
notification:
  enabled: true                      # 是否启用通知
  channels:
    # 飞书通知（推荐）
    - type: "feishu"
      target: "chat:oc_362047fad55744020b6c11c92951938a"  # 当前群聊
      webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/cf13d01e-0d35-4abf-9b1e-d7af77afd6c5"
    
    # Discord 通知（可选）
    # - type: "discord"
    #   target: "channel:123456789"
    
    # 邮件通知（可选）
    # - type: "email"
    #   target: "your@email.com"
    
    # Telegram 通知（可选）
    # - type: "telegram"
    #   target: "@your_username"

# 监控设置
monitoring:
  check_interval: 2                  # 检查间隔（秒），建议 2-5 秒
  max_session_duration: 1800         # 最大会话时长（秒），30分钟，超时自动重置

# 注意：以下配置为未来扩展保留，当前 MVP 版本不使用
# summary:
#   mode: "brief"           # brief（简洁）/ detailed（详细）/ none（关闭）
#   include_ai: false       # 是否调用 AI 生成智能总结（会消耗 token）

# 权限设置
permissions:
  mode: "auto_approve"             # ask（询问）/ auto（自动）/ auto_approve（自动批准）/ silent（静默）
  auto_allow_patterns:
    - ".*\\.py$"           # 允许所有 Python 文件
    - ".*\\.txt$"          # 允许所有文本文件
    - ".*\\.md$"           # 允许所有 Markdown 文件
    - ".*test.*\\.py$"     # 允许测试文件
    - ".*docs?/.*"         # 允许文档目录
    - ".*config/.*"        # 允许配置目录
    
  # 模式说明：
  # - ask: 检测到权限时发送通知，等待用户确认
  # - auto: 根据白名单自动决策（匹配则允许，否则拒绝）
  # - auto_approve: 自动批准所有权限请求（最宽松）
  # - silent: 静默拒绝所有权限请求
